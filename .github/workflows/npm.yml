name: Build and publish to npmjs
on:
  release:
    types: [created]
  push:
    tags:
      - v**

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # npm Trusted Publishing requires npm >= 11.5.1; Node 22 ships with npm 10.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run test
      - run: npm run build
      - run: npm publish --provenance
